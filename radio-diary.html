<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mkuu Amani - Radio Diary</title>
<style>
body {
  background: #02060d;
  color: #FFD700;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
}
button {
  padding: 14px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: #FFD700;
  color: #000;
  margin-bottom: 20px;
}
button.recording {
  background: #ff4d4d !important;
  color: #fff !important;
}
.entries{ width:100%; max-width:600px; }
.entry{
  background:#0b0b0b;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}
.entry p{ margin:0 0 10px 0; font-size:14px; opacity:0.8; }
audio{ width:100%; }
</style>
</head>
<body>

<h1>High-Quality Recorder</h1>
<button id="recordBtn">Start Recording</button>
<div class="entries" id="entries"></div>

<!-- Recorder.js library -->
<script src="https://cdn.jsdelivr.net/npm/recorder-js@1.0.3/dist/recorder.min.js"></script>

<script>
let audioContext;
let recorder;
let isRecording = false;
const recordBtn = document.getElementById("recordBtn");
const entries = document.getElementById("entries");

recordBtn.onclick = async () => {
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 44100,
        channelCount: 1,
        noiseSuppression: false,
        echoCancellation: false
      }
    });

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const input = audioContext.createMediaStreamSource(stream);

    // Gain node for normalization
    const gainNode = audioContext.createGain();
    input.connect(gainNode);

    // Optional: normalize volume by dynamically adjusting gain
    // Simple auto-normalization using max peak
    gainNode.gain.value = 1.0; // Start neutral

    recorder = new Recorder(gainNode, { numChannels: 1 });
    await recorder.start();

    recordBtn.textContent = "Stop Recording";
    recordBtn.classList.add("recording");
    isRecording = true;

  } else {
    const { blob, buffer } = await recorder.stop();

    // Simple normalization: find max amplitude and scale
    let max = 0;
    buffer[0].forEach(v => { if(Math.abs(v) > max) max = Math.abs(v); });
    const normalizeFactor = max > 0 ? 1 / max : 1;

    const normalizedBuffer = buffer[0].map(v => v * normalizeFactor);

    // Create WAV from normalized buffer
    const offlineCtx = new OfflineAudioContext(1, normalizedBuffer.length, 44100);
    const audioBuffer = offlineCtx.createBuffer(1, normalizedBuffer.length, 44100);
    audioBuffer.copyToChannel(Float32Array.from(normalizedBuffer), 0, 0);

    offlineCtx.startRendering().then(renderedBuffer => {
      const wavBlob = recorder.exportWAV(renderedBuffer);
      const audioURL = URL.createObjectURL(wavBlob);

      const time = new Date();
      const timestamp = time.toISOString().replace("T","_").split(".")[0].replace(/:/g,"-");

      // Auto download WAV
      const a = document.createElement("a");
      a.href = audioURL;
      a.download = `Peace_LiveShow_${timestamp}.wav`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // Add entry to page
      const entry = document.createElement("div");
      entry.className = "entry";
      entry.innerHTML = `
        <p>${time.toLocaleString()}</p>
        <audio controls src="${audioURL}"></audio>
      `;
      entries.prepend(entry);
    });

    recordBtn.textContent = "Start Recording";
    recordBtn.classList.remove("recording");
    isRecording = false;
  }
};
</script>

</body>
</html>
<!-- PRODIGAL SUN RADIO X POST GENERATOR WITH COVER ART -->
<div id="xPostGenerator" style="margin-top:30px; padding:20px; background:#111; border-radius:12px; color:#fff; font-family:Arial,sans-serif;">
  <h2 style="margin-bottom:10px; color:#f7c873;">Generate X Post</h2>

  <div id="currentTrackPreview" style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
    <img id="trackCover" src="" alt="Cover Art" style="width:60px; height:60px; border-radius:6px; object-fit:cover; display:none;">
    <div>
      <div id="trackArtist" style="font-weight:bold; font-size:16px;"></div>
      <div id="trackTitle" style="font-size:14px; opacity:0.8;"></div>
    </div>
  </div>

  <textarea id="xPostInput" placeholder="Type your message..." 
    style="width:100%; height:80px; padding:10px; border-radius:8px; border:none; resize:none; font-size:16px;"></textarea>

  <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
    <button id="xGenerateButton" 
      style="padding:10px 20px; font-size:16px; background:#1da1f2; color:#fff; border:none; border-radius:8px; cursor:pointer;">
      Generate Post
    </button>
    <span id="xCharCount" style="margin-left:auto; font-size:14px;">0 / 280</span>
  </div>

  <div id="xOutput" style="margin-top:15px; padding:10px; background:#222; border-radius:8px; min-height:40px; white-space:pre-wrap;"></div>
</div>

<script>
(function(){
  const SHEET_API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";
  const input = document.getElementById("xPostInput");
  const button = document.getElementById("xGenerateButton");
  const output = document.getElementById("xOutput");
  const charCount = document.getElementById("xCharCount");
  const coverImg = document.getElementById("trackCover");
  const trackArtist = document.getElementById("trackArtist");
  const trackTitle = document.getElementById("trackTitle");

  let currentTrack = {artist:"", title:"", cover:""};

  // Fetch current track info from RadioKing
  async function fetchCurrentTrack(){
    try {
      const res = await fetch(SHEET_API, {cache:"no-store"});
      const data = await res.json();
      const artist = data.artist || "";
      const title = data.title || "";
      const cover = data.cover || data.album?.cover || ""; // fallback if API returns album object
      currentTrack = {artist, title, cover};

      trackArtist.textContent = artist;
      trackTitle.textContent = title;

      if(cover){
        coverImg.src = cover;
        coverImg.style.display = "block";
      } else {
        coverImg.style.display = "none";
      }

      // Auto-fill input if empty
      if(input.value.trim()===""){
        input.value = `🎵 Now Playing: ${artist} – ${title}`;
        charCount.textContent = `${input.value.length} / 280`;
      }

    } catch(e){
      console.log("Error fetching current track", e);
    }
  }

  // Update character count dynamically
  input.addEventListener("input", () => {
    charCount.textContent = `${input.value.length} / 280`;
  });

  // Generate X post
  button.addEventListener("click", () => {
    let text = input.value.trim();
    if(!text){
      output.textContent = "Please enter a message first.";
      return;
    }
    const postText = `🎧 Prodigal Sun Radio\n${text}\n#PSR #Radio`;
    output.textContent = postText;

    // Open X intent
    const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(postText);
    window.open(url, "_blank");
  });

  // Initial fetch
  fetchCurrentTrack();

  // Refresh current track every 15 seconds
  setInterval(fetchCurrentTrack, 15000);

})();
</script>
